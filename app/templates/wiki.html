{% extends "base.html" %}

{% block title %}Protocol Wiki | Deadhand{% endblock %}

{% block content %}
<style>
    .wiki-container {
        max-width: 800px;
        margin: 0 auto;
        padding: 60px 20px;
        color: var(--text-secondary);
        line-height: 1.8;
    }

    .wiki-container h1, .wiki-container h2, .wiki-container h3 {
        color: var(--text-primary);
        margin-top: 2em;
        margin-bottom: 1em;
        letter-spacing: -0.02em;
    }

    .wiki-container h1 {
        font-size: 2.5rem;
        border-bottom: 1px solid var(--border);
        padding-bottom: 10px;
        margin-top: 0;
    }

    .wiki-container h2 {
        font-size: 1.75rem;
    }

    .wiki-container hr {
        border: 0;
        border-top: 1px solid var(--border);
        margin: 3em 0;
    }

    .wiki-container p {
        margin-bottom: 1.5em;
    }

    .wiki-container ul, .wiki-container ol {
        margin-bottom: 1.5em;
        padding-left: 1.5em;
    }

    .wiki-container li {
        margin-bottom: 0.5em;
    }

    .wiki-container strong {
        color: var(--text-primary);
        font-weight: 600;
    }

    .wiki-container table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 2em;
        margin-bottom: 2em;
    }

    .wiki-container th, .wiki-container td {
        border: 1px solid var(--border);
        padding: 12px 16px;
        text-align: left;
    }

    .wiki-container th {
        background-color: var(--bg-secondary);
        color: var(--text-primary);
        font-weight: 600;
    }

    .wiki-container code {
        background-color: var(--bg-secondary);
        padding: 2px 6px;
        border-radius: 4px;
        font-family: 'Geist Mono', monospace;
        font-size: 0.9em;
    }
</style>

<div class="wiki-container">
    {{ content | safe }}
</div>
{% endblock %}
